<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveShow – On Stage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 2rem;
      background: #111;
      border-bottom: 2px solid #333;
      flex-shrink: 0;
    }
    header h1 { font-size: 2.5rem; letter-spacing: 0.05em; color: #00cc66; }
    header a { color: #888; font-size: 1rem; text-decoration: none; }
    header a:hover { color: #ccc; }
    .panels {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }
    .panel {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      border-right: 2px solid #222;
    }
    .panel:last-child { border-right: none; }
    .panel-title {
      font-size: 1.4rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .card {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      font-size: 2rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .card:hover { background: #2a2a2a; border-color: #555; }
    .card.selected { background: #003322; border-color: #00cc66; color: #00cc66; }
    footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 1rem 2rem;
      background: #111;
      border-top: 2px solid #333;
      flex-shrink: 0;
    }
    #launch-btn {
      background: #00cc66;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.9rem 2.5rem;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #launch-btn:hover:not(:disabled) { background: #00ff77; }
    #launch-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>LiveShow</h1>
    <a href="/remote">⚙ Remote</a>
  </header>
  <div class="panels">
    <div class="panel" id="queue-panel-wrap">
      <div class="panel-title">Queues</div>
      <div id="queue-panel"></div>
    </div>
    <div class="panel" id="script-panel-wrap">
      <div class="panel-title">Scripts</div>
      <div id="script-panel"></div>
    </div>
  </div>
  <footer>
    <button id="launch-btn" disabled>▶ Launch Teleprompter</button>
  </footer>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/stage.js"></script>
</body>
</html>
