<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveShow – Teleprompter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #e8e8e8;
      font-family: "Georgia", serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    @keyframes titleBarFade {
      from { background: #162b1e; }
      to   { background: #0a0a0a; }
    }
    #title-bar {
      background: #0a0a0a;
      border-bottom: 2px solid #1a1a1a;
      padding: 0.5rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #title-bar.loading {
      animation: titleBarFade 8s ease-out forwards;
    }
    #script-title {
      font-size: 1.8rem;
      color: #00cc66;
      font-weight: bold;
    }
    #shortcuts-hint {
      font-size: 0.85rem;
      color: #555;
    }
    #scroll-area {
      flex: 1;
      overflow-y: scroll;
      padding: 3rem 8vw;
      scroll-behavior: auto;
    }
    #script-body {
      font-size: 2.5rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 900px;
      margin: 0 auto;
      padding-bottom: 60vh;
    }
    #control-bar {
      background: #0a0a0a;
      border-top: 2px solid #1a1a1a;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .ctrl-btn {
      background: #1e1e1e;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 0.5rem 1.25rem;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: #333; }
    #start-stop-btn {
      background: #00cc66;
      color: #000;
      font-weight: bold;
      border-color: #00cc66;
      min-width: 100px;
    }
    #start-stop-btn:hover { background: #00ff77; }
    #back-btn { background: #440000; border-color: #880000; }
    #back-btn:hover { background: #660000; }
    .speed-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1rem;
      color: #aaa;
    }
    #speed-slider { width: 120px; accent-color: #00cc66; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="title-bar">
    <div id="script-title">Loading…</div>
    <div id="shortcuts-hint">Space: pause/resume &nbsp;|&nbsp; ↑↓: scroll &nbsp;|&nbsp; PgUp/PgDn: jump &nbsp;|&nbsp; Esc: exit &nbsp;|&nbsp; Pedal: configurable</div>
  </div>
  <div id="scroll-area">
    <div id="script-body"></div>
  </div>
  <div id="control-bar">
    <button id="start-stop-btn" class="ctrl-btn">Start</button>
    <div class="speed-group">
      <label for="speed-slider">Speed</label>
      <input id="speed-slider" type="range" min="1" max="10" step="0.5" value="3">
      <span id="speed-val">3</span>
    </div>
    <button id="page-up-btn" class="ctrl-btn">⬆ Page Up</button>
    <button id="page-down-btn" class="ctrl-btn">⬇ Page Down</button>
    <button id="back-btn" class="ctrl-btn">✕ Back</button>
  </div>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/teleprompter.js"></script>
</body>
</html>
