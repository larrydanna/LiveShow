<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveShow – Remote</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        onerror="this.remove()">
  <style>
    /* Fallback styles when Bootstrap CDN is unavailable (on-premises/offline use) */
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #212529; margin: 0; padding: 0; }
    .container { max-width: 960px; margin: 0 auto; padding: 0 1rem; }
    .py-4 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
    .mb-0 { margin-bottom: 0 !important; }
    .mb-2 { margin-bottom: 0.5rem !important; }
    .mb-3 { margin-bottom: 1rem !important; }
    .mb-4 { margin-bottom: 1.5rem !important; }
    .me-1 { margin-right: 0.25rem !important; }
    .mt-2 { margin-top: 0.5rem !important; }
    .h3 { font-size: 1.5rem; font-weight: 600; }
    h5 { font-size: 1.1rem; font-weight: 600; }
    .d-flex { display: flex; }
    .align-items-center { align-items: center; }
    .justify-content-between { justify-content: space-between; }
    .flex-grow-1 { flex-grow: 1; }
    .gap-1 { gap: 0.25rem; }
    .gap-2 { gap: 0.5rem; }
    .flex-wrap { flex-wrap: wrap; }
    .text-nowrap { white-space: nowrap; }
    .fw-bold { font-weight: 700; }
    .text-muted { color: #6c757d; }
    small { font-size: 0.875em; }
    .row { display: flex; flex-wrap: wrap; margin: -0.375rem; }
    .g-3 { gap: 0.75rem; }
    .col-md-6 { flex: 0 0 calc(50% - 0.75rem); min-width: 280px; }
    .col-12 { flex: 0 0 100%; }
    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.375rem 0.75rem; font-size: 1rem; font-weight: 400; line-height: 1.5; border: 1px solid transparent; border-radius: 0.375rem; cursor: pointer; text-decoration: none; transition: background 0.15s; white-space: nowrap; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
    .btn-primary { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .btn-primary:hover { background: #0b5ed7; border-color: #0a58ca; }
    .btn-danger { background: #dc3545; color: #fff; border-color: #dc3545; }
    .btn-danger:hover { background: #b02a37; }
    .btn-success { background: #198754; color: #fff; border-color: #198754; }
    .btn-success:hover { background: #157347; }
    .btn-warning { background: #ffc107; color: #000; border-color: #ffc107; }
    .btn-warning:hover { background: #ffca2c; }
    .btn-outline-secondary { background: transparent; color: #6c757d; border-color: #6c757d; }
    .btn-outline-secondary:hover { background: #6c757d; color: #fff; }
    .btn-outline-primary { background: transparent; color: #0d6efd; border-color: #0d6efd; }
    .btn-outline-primary:hover { background: #0d6efd; color: #fff; }
    .btn-outline-danger { background: transparent; color: #dc3545; border-color: #dc3545; }
    .btn-outline-danger:hover { background: #dc3545; color: #fff; }
    /* Forms */
    .form-control, .form-select { display: block; width: 100%; padding: 0.375rem 0.75rem; font-size: 1rem; line-height: 1.5; color: #212529; background: #fff; border: 1px solid #ced4da; border-radius: 0.375rem; outline: none; }
    .form-control:focus, .form-select:focus { border-color: #86b7fe; box-shadow: 0 0 0 0.25rem rgba(13,110,253,.25); }
    textarea.form-control { resize: vertical; }
    .form-range { width: 100%; height: 1.5rem; cursor: pointer; accent-color: #0d6efd; }
    .form-label { margin-bottom: 0.5rem; display: block; }
    /* Input group */
    .input-group { display: flex; }
    .input-group-sm .form-control, .input-group-sm .form-select, .input-group-sm .btn { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
    .input-group > * { border-radius: 0 !important; }
    .input-group > *:first-child { border-radius: 0.375rem 0 0 0.375rem !important; }
    .input-group > *:last-child { border-radius: 0 0.375rem 0.375rem 0 !important; }
    /* Nav tabs */
    .nav-tabs { display: flex; list-style: none; padding: 0; margin: 0; border-bottom: 1px solid #dee2e6; }
    .nav-item { margin-bottom: -1px; }
    .nav-link { display: block; padding: 0.5rem 1rem; color: #495057; text-decoration: none; border: 1px solid transparent; border-radius: 0.375rem 0.375rem 0 0; cursor: pointer; background: none; }
    .nav-link:hover { border-color: #e9ecef #e9ecef #dee2e6; color: #495057; }
    .nav-link.active { color: #495057; background: #fff; border-color: #dee2e6 #dee2e6 #fff; }
    /* Tab panes */
    .tab-pane { display: none; }
    .tab-pane.show.active { display: block; }
    /* Cards */
    .card { background: #fff; border: 1px solid rgba(0,0,0,.125); border-radius: 0.375rem; }
    .card-header { padding: 0.5rem 1rem; background: #f8f9fa; border-bottom: 1px solid rgba(0,0,0,.125); border-radius: 0.375rem 0.375rem 0 0; }
    .card-body { padding: 1rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    /* List group */
    .list-group { display: flex; flex-direction: column; padding: 0; margin: 0; border-radius: 0.375rem; }
    .list-group-item { position: relative; display: block; padding: 0.5rem 1rem; background: #fff; border: 1px solid rgba(0,0,0,.125); word-break: break-word; }
    .list-group-item + .list-group-item { border-top-width: 0; }
    /* Alerts */
    .alert { padding: 0.75rem 1rem; border: 1px solid transparent; border-radius: 0.375rem; margin-bottom: 1rem; }
    .alert-success { background: #d1e7dd; border-color: #badbcc; color: #0f5132; }
    .alert-danger { background: #f8d7da; border-color: #f5c2c7; color: #842029; }
    /* Responsive */
    @media (max-width: 600px) { .col-md-6 { flex: 0 0 100%; } }
    /* Custom */
    .nav-tabs .nav-link { cursor: pointer; }
    #scripts-list .list-group-item, #queues-list .card { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h1 class="h3 mb-0"><span id="instance-name">LiveShow</span> Remote</h1>
      <a href="/" class="btn btn-sm btn-outline-secondary">← Stage</a>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <a class="nav-link active" data-tab="tab-stage">Stage Control</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-tab="tab-scripts">Scripts</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-tab="tab-queues">Queues</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-tab="tab-settings">Settings</a>
      </li>
    </ul>

    <!-- Scripts Tab -->
    <div id="tab-scripts" class="tab-pane">
      <h5 class="mb-3">Add Script</h5>
      <form id="add-script-form" class="mb-4">
        <div class="mb-2">
          <input name="title" class="form-control" placeholder="Title" required>
        </div>
        <div class="mb-2">
          <textarea name="body" class="form-control" rows="6" placeholder="Script body…" required></textarea>
        </div>
        <div class="mb-2">
          <input name="submitted_by" class="form-control" placeholder="Submitted by" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Script</button>
      </form>
      <h5 class="mb-2">All Scripts</h5>
      <div id="scripts-list" class="list-group"></div>
    </div>

    <!-- Queues Tab -->
    <div id="tab-queues" class="tab-pane">
      <h5 class="mb-3">Create Queue</h5>
      <form id="add-queue-form" class="mb-4 d-flex gap-2">
        <input id="new-queue-name" class="form-control" placeholder="Queue name" required>
        <button type="submit" class="btn btn-primary text-nowrap">Create</button>
      </form>
      <h5 class="mb-2">All Queues</h5>
      <div id="queues-list"></div>
    </div>

    <!-- Stage Control Tab -->
    <div id="tab-stage" class="tab-pane show active">
      <h5 class="mb-3">Stage Control</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Active Queue</label>
          <select id="stage-queue-select" class="form-select">
            <option value="">-- None --</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Active Script</label>
          <select id="stage-script-select" class="form-select">
            <option value="">-- None --</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-bold">Auto-Scroll Speed: <span id="stage-speed-val">3</span></label>
          <input id="stage-speed-slider" type="range" class="form-range" min="1" max="10" step="0.5" value="3">
        </div>
        <div class="col-12 d-flex gap-2 flex-wrap">
          <button id="stage-scroll-toggle" class="btn btn-success">Start Scrolling</button>
          <button id="stage-page-up" class="btn btn-outline-secondary">⬆ Page Up</button>
          <button id="stage-page-down" class="btn btn-outline-secondary">⬇ Page Down</button>
        </div>
        <div class="col-12">
          <button id="stage-launch-btn" class="btn btn-primary" disabled>▶ Launch Teleprompter</button>
        </div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div id="tab-settings" class="tab-pane">
      <h5 class="mb-3">Instance Settings</h5>
      <form id="settings-form" class="mb-4">
        <div class="mb-3">
          <label for="instance-name-input" class="form-label fw-bold">Instance Name</label>
          <input id="instance-name-input" name="instance_name" class="form-control" maxlength="64"
                 placeholder="LiveShow" style="max-width: 400px;">
          <small class="text-muted">Up to 64 characters. Shown at the top of every screen.</small>
        </div>
        <div id="settings-alert" class="alert" style="display:none; max-width:400px;"></div>
        <button type="submit" class="btn btn-primary">Save</button>
      </form>
    </div>
  </div>

  <script>
    // Load Bootstrap JS from CDN if available (enhances dropdowns/modals when online)
    var bsScript = document.createElement('script');
    bsScript.src = 'https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js';
    document.head.appendChild(bsScript);
  </script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/remote.js"></script>
</body>
</html>
