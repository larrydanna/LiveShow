<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveShow – Remote</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .nav-tabs .nav-link { cursor: pointer; }
    .list-group-item { word-break: break-word; }
    #scripts-list .list-group-item,
    #queues-list .card { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <h1 class="h3 mb-0">LiveShow Remote</h1>
      <a href="/" class="btn btn-sm btn-outline-secondary">← Stage</a>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <a class="nav-link active" data-tab="tab-scripts">Scripts</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-tab="tab-queues">Queues</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" data-tab="tab-stage">Stage Control</a>
      </li>
    </ul>

    <!-- Scripts Tab -->
    <div id="tab-scripts" class="tab-pane show active">
      <h5 class="mb-3">Add Script</h5>
      <form id="add-script-form" class="mb-4">
        <div class="mb-2">
          <input name="title" class="form-control" placeholder="Title" required>
        </div>
        <div class="mb-2">
          <textarea name="body" class="form-control" rows="6" placeholder="Script body…" required></textarea>
        </div>
        <div class="mb-2">
          <input name="submitted_by" class="form-control" placeholder="Submitted by" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Script</button>
      </form>
      <h5 class="mb-2">All Scripts</h5>
      <div id="scripts-list" class="list-group"></div>
    </div>

    <!-- Queues Tab -->
    <div id="tab-queues" class="tab-pane">
      <h5 class="mb-3">Create Queue</h5>
      <form id="add-queue-form" class="mb-4 d-flex gap-2">
        <input id="new-queue-name" class="form-control" placeholder="Queue name" required>
        <button type="submit" class="btn btn-primary text-nowrap">Create</button>
      </form>
      <h5 class="mb-2">All Queues</h5>
      <div id="queues-list"></div>
    </div>

    <!-- Stage Control Tab -->
    <div id="tab-stage" class="tab-pane">
      <h5 class="mb-3">Stage Control</h5>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Active Queue</label>
          <select id="stage-queue-select" class="form-select">
            <option value="">-- None --</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Active Script</label>
          <select id="stage-script-select" class="form-select">
            <option value="">-- None --</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label fw-bold">Auto-Scroll Speed: <span id="stage-speed-val">3</span></label>
          <input id="stage-speed-slider" type="range" class="form-range" min="1" max="10" step="0.5" value="3">
        </div>
        <div class="col-12 d-flex gap-2 flex-wrap">
          <button id="stage-scroll-toggle" class="btn btn-success">Start Scrolling</button>
          <button id="stage-page-up" class="btn btn-outline-secondary">⬆ Page Up</button>
          <button id="stage-page-down" class="btn btn-outline-secondary">⬇ Page Down</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/remote.js"></script>
</body>
</html>
